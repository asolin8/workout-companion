<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Companion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  #authScreen { display:flex; flex-direction:column; gap:10px; max-width:280px; margin: 80px auto; }
  #authScreen input { padding:10px; font-size:14px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); }
  #authScreen button.primary { background: var(--accent); color:#fff; border-color: var(--accent); padding:10px; font-size:14px; border-radius:8px; cursor:pointer; }
  #authScreen button { border-radius:8px; padding:8px; cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text); }
  #authError { color: var(--danger); font-size:13px; min-height:16px; }
  #logoutRow { text-align:right; }
  #logoutRow button { font-size:11px; color:var(--text-2); background:none; border:none; cursor:pointer; }
  :root {
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #1e1c1a;
    --text-2: #6b6660;
    --border: #e4e0da;
    --accent: #7a4a3a;
    --accent-bg: #f3e9e4;
    --accent-text: #5c3527;
    --danger: #a3352f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171513;
      --card: #221f1d;
      --text: #f2efeb;
      --text-2: #a8a29b;
      --border: #38332e;
      --accent: #d8917a;
      --accent-bg: #3a2a24;
      --accent-text: #f0c3b3;
      --danger: #e07068;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
    padding-bottom: 3rem;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 1.25rem 1rem 0; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 1rem; }
  h2 { font-size: 16px; font-weight: 600; margin: 0 0 0.75rem; }
  .tabs, .subtabs {
    display: flex; gap: 8px; margin-bottom: 1rem;
  }
  .tabs button, .subtabs button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-2); font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .tabs button.active, .subtabs button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .subtabs button { padding: 8px; font-size: 13px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .ex-name { font-size: 15px; font-weight: 600; margin: 0; }
  .ex-meta { font-size: 13px; color: var(--text-2); margin: 2px 0 10px; }
  .part-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--accent-text); background: var(--accent-bg); display: inline-block;
    padding: 2px 8px; border-radius: 6px; margin: 6px 0 6px;
  }
  ol { margin: 0 0 4px; padding-left: 1.2rem; font-size: 14px; }
  ol li { margin-bottom: 4px; }
  .warmup-note { font-size: 13px; color: var(--text-2); margin-bottom: 10px; }
  label.field { display: block; font-size: 13px; color: var(--text-2); margin: 10px 0 4px; }
  input[type="number"], input[type="date"] {
    width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 15px;
  }
  .weight-row { display: flex; align-items: center; gap: 10px; }
  .weight-row .field-wrap { flex: 1; }
  button.primary {
    width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent);
    color: #fff; font-size: 15px; font-weight: 600; margin-top: 1rem; cursor: pointer;
  }
  button.primary:active { opacity: 0.85; }
  .weight-row { flex-wrap: wrap; }
  .field-wrap.small { flex: 0 0 84px; }
  .session-card {
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
  }
  .session-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .session-date { font-size: 14px; font-weight: 600; }
  .ex-log-row {
    display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0;
    border-bottom: 1px dashed var(--border);
  }
  .ex-log-row:last-child { border-bottom: none; }
  .ex-log-name { color: var(--text); }
  .ex-log-val { color: var(--text-2); text-align: right; }
  .del-btn {
    background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; padding: 0 4px;
  }
  .empty { color: var(--text-2); font-size: 13px; padding: 10px 0; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text-2); text-transform: uppercase;
    letter-spacing: 0.03em; margin: 1.25rem 0 0.5rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.25s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="authScreen">
  <div style="font-size:16px;font-weight:600;text-align:center;margin-bottom:6px;">Log in</div>
  <input type="email" id="authEmail" placeholder="Email" />
  <input type="password" id="authPassword" placeholder="Password" />
  <button class="primary" id="loginBtn">Log in</button>
  <button id="signupBtn">Create account</button>
  <div id="authError"></div>
</div>

<div class="wrap" id="appScreen" style="display:none;">
  <div id="logoutRow"><button id="logoutBtn">Log out</button></div>
  <h1>Workout companion</h1>
  <div class="tabs">
    <button id="tab-guide" class="active">Guide</button>
    <button id="tab-tracker">Tracker</button>
  </div>

  <div id="view-guide">
    <div class="subtabs">
      <button id="guide-a" class="active">Day A · Mon</button>
      <button id="guide-b">Day B · Thu</button>
    </div>
    <div id="guide-content"></div>
  </div>

  <div id="view-tracker" style="display:none;">
    <div class="subtabs">
      <button id="track-a" class="active">Day A · Mon</button>
      <button id="track-b">Day B · Thu</button>
    </div>
    <div class="card">
      <h2>Log today's weights</h2>
      <label class="field">Date</label>
      <input type="date" id="log-date">
      <div id="log-fields"></div>
      <button class="primary" id="save-log">Save session</button>
    </div>
    <div class="section-title">History</div>
    <div class="card">
      <div id="history"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast">Saved</div>

<script>
const SUPABASE_URL = 'https://fzcqmmshsrvuoxgfibpc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_av5zRHJ8S3B1aiezJ4ZRcA_yWx-wxsG';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const STORAGE_KEY = 'workout-log';

const warmup = [
  "Jump rope \u2014 6 minutes continuous, moderate pace.",
  "Leg swings \u2014 30 sec each leg, front-to-back then side-to-side.",
  "Standing hip circles \u2014 5 circles each direction, each leg. Lift your knee to hip height and trace a circle with it.",
  "Bodyweight squats \u2014 10 slow reps, full depth.",
  "Arm circles + shoulder pass-throughs \u2014 30 sec each. Small-to-large circles both directions, then a band or stick overhead and back with straight arms.",
  "Stationary reverse lunge with twist \u2014 30 sec. Step back into a reverse lunge, rotate your torso toward your front leg at the bottom, alternate legs."
];

const exercises = {
  a: [
    { id: "a-squat", name: "Goblet squat", meta: "4 sets x 6\u20138", parts: [
      { label: null, cues: [
        "Hold a dumbbell vertically against your chest, cupping the top end with both hands.",
        "Stand with feet shoulder-width, toes slightly turned out.",
        "Sit your hips back and down, chest tall, elbows brushing the inside of your knees at the bottom.",
        "Drive through your whole foot to stand back up."
      ]}
    ]},
    { id: "a-bench", name: "Flat dumbbell bench press", meta: "3 sets x 8\u201310", parts: [
      { label: null, cues: [
        "Lie back on a bench, a dumbbell in each hand at chest level, palms facing your feet.",
        "Keep elbows at roughly a 45\u00b0 angle from your torso, not flared straight out.",
        "Press the dumbbells up until arms are extended, without locking elbows hard.",
        "Lower with control until you feel a stretch across your chest, then repeat."
      ]}
    ]},
    { id: "a-row", name: "Bent-over row", meta: "3 sets x 8\u201310", parts: [
      { label: null, cues: [
        "Hinge forward at the hips with a slight knee bend, back flat, dumbbells hanging below your shoulders.",
        "Pull the dumbbells toward your hips, leading with your elbows.",
        "Squeeze your shoulder blades together at the top.",
        "Lower with control back to the start."
      ]}
    ]},
    { id: "a-lunge", name: "Reverse lunge", meta: "3 sets x 10/leg", parts: [
      { label: null, cues: [
        "Stand tall, holding dumbbells at your sides if using weight.",
        "Step one foot back and lower until both knees are close to 90\u00b0.",
        "Keep your front knee tracking over your ankle, not past your toes.",
        "Push through your front heel to return to standing, then alternate legs."
      ]}
    ]},
    { id: "a-press", name: "Shoulder press", meta: "Superset x2 rounds \u2014 10\u201312 reps", parts: [
      { label: "Shoulder press", cues: [
        "Hold dumbbells at shoulder height, palms facing forward.",
        "Press overhead until arms are extended.",
        "Lower with control back to shoulder height."
      ]}
    ]},
    { id: "a-curl", name: "Curl", meta: "Superset x2 rounds \u2014 10\u201312 reps", parts: [
      { label: "Curl", cues: [
        "Arms at your sides, palms facing forward.",
        "Curl the weights toward your shoulders without swinging your elbows forward.",
        "Lower slowly back to the start."
      ]}
    ]}
  ],
  b: [
    { id: "b-rdl", name: "Romanian deadlift", meta: "4 sets x 8", parts: [
      { label: null, cues: [
        "Hold dumbbells in front of your thighs, knees soft.",
        "Push your hips back while keeping the weights close to your legs.",
        "Lower until you feel a stretch in your hamstrings, roughly shin height.",
        "Drive your hips forward to return to standing."
      ]}
    ]},
    { id: "b-ohp", name: "Overhead press", meta: "3 sets x 8\u201310", parts: [
      { label: null, cues: [
        "Dumbbells at shoulder height, palms facing forward.",
        "Press straight overhead without arching your lower back.",
        "Lower with control back to shoulder height."
      ]}
    ]},
    { id: "b-pulldown", name: "Lat pulldown or pull-ups", meta: "3 sets x 8\u201310", parts: [
      { label: null, cues: [
        "Grip slightly wider than shoulder-width.",
        "Pull the bar to your upper chest (or pull yourself up until your chin clears the bar), leading with your elbows down and back.",
        "Control the return to the top."
      ]}
    ]},
    { id: "b-split", name: "Bulgarian split squat", meta: "3 sets x 8/leg", parts: [
      { label: null, cues: [
        "Rest your rear foot on a bench behind you.",
        "Position your front foot far enough forward that your knee stays over your ankle at the bottom.",
        "Lower until your rear knee nearly touches the ground.",
        "Drive up through your front foot, then switch legs."
      ]}
    ]},
    { id: "b-facepull", name: "Face pull", meta: "Superset x2 rounds \u2014 12\u201315 reps", parts: [
      { label: "Face pull", cues: [
        "Pull a rope or band toward your face, elbows high.",
        "Squeeze your shoulder blades together at the end.",
        "Control the return."
      ]}
    ]},
    { id: "b-tricep", name: "Tricep pushdown", meta: "Superset x2 rounds \u2014 10\u201312 reps", parts: [
      { label: "Tricep pushdown", cues: [
        "Elbows pinned to your sides.",
        "Extend your forearms down until arms are straight.",
        "Control the return."
      ]}
    ]}
  ]
};

let guideDay = 'a';
let trackDay = 'a';
let logData = { a: [], b: [] };

function renderGuide() {
  const el = document.getElementById('guide-content');
  let html = '<div class="card"><h2>Warmup \u2014 ~9 min</h2><div class="warmup-note">Same for both days.</div><ol>';
  warmup.forEach(w => html += '<li>' + w + '</li>');
  html += '</ol></div>';
  exercises[guideDay].forEach(ex => {
    html += '<div class="card"><p class="ex-name">' + ex.name + '</p><p class="ex-meta">' + ex.meta + '</p>';
    ex.parts.forEach(p => {
      if (p.label) html += '<div class="part-label">' + p.label + '</div>';
      html += '<ol>';
      p.cues.forEach(c => html += '<li>' + c + '</li>');
      html += '</ol>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderLogFields() {
  const el = document.getElementById('log-fields');
  let html = '';
  exercises[trackDay].forEach(ex => {
    html += '<div class="weight-row">' +
      '<div class="field-wrap"><label class="field">' + ex.name + ' (lbs)</label>' +
      '<input type="number" inputmode="decimal" step="2.5" min="0" data-ex="' + ex.id + '" class="log-input weight-input"></div>' +
      '<div class="field-wrap small"><label class="field">Sets</label>' +
      '<input type="number" inputmode="numeric" step="1" min="0" data-ex="' + ex.id + '" class="log-input sets-input"></div>' +
      '</div>';
  });
  el.innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('history');
  const entries = logData[trackDay].slice().sort((a, b) => b.date.localeCompare(a.date));
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty">No sessions logged yet for this day.</div>';
    return;
  }
  const exList = exercises[trackDay];
  let html = '';
  entries.forEach(entry => {
    html += '<div class="session-card"><div class="session-head"><span class="session-date">' + entry.date + '</span>' +
      '<button class="del-btn" data-id="' + entry.id + '" data-day="' + trackDay + '">\u2715</button></div>';
    exList.forEach(ex => {
      const rec = entry.weights[ex.id];
      let weightVal = '\u2014', setsVal = '';
      if (rec && typeof rec === 'object') {
        weightVal = (rec.weight !== undefined && rec.weight !== '') ? rec.weight + ' lbs' : '\u2014';
        setsVal = (rec.sets !== undefined && rec.sets !== '') ? ' x ' + rec.sets + ' sets' : '';
      } else if (rec !== undefined && rec !== '') {
        weightVal = rec + ' lbs';
      }
      html += '<div class="ex-log-row"><span class="ex-log-name">' + ex.name + '</span>' +
        '<span class="ex-log-val">' + weightVal + setsVal + '</span></div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
  el.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = btn.getAttribute('data-day');
      const id = btn.getAttribute('data-id');
      logData[day] = logData[day].filter(e => e.id !== id);
      persist();
      renderHistory();
    });
  });
}

function persist() {
  try {
    supabaseClient.from('app_data').upsert({
      user_id: CURRENT_USER_ID,
      key: STORAGE_KEY,
      value: JSON.stringify(logData)
    }, { onConflict: 'user_id,key' }).then(({error}) => { if(error) console.error('Storage error', error); });
  } catch (e) {
    console.error('Storage error', e);
  }
}

let CURRENT_USER_ID = null;

async function loadData() {
  try {
    const { data: userData } = await supabaseClient.auth.getUser();
    CURRENT_USER_ID = userData.user.id;
    const { data, error } = await supabaseClient
      .from('app_data')
      .select('value')
      .eq('user_id', CURRENT_USER_ID)
      .eq('key', STORAGE_KEY)
      .maybeSingle();
    if(!error && data){
      const parsed = JSON.parse(data.value);
      logData = { a: parsed.a || [], b: parsed.b || [] };
    }
  } catch (e) {
    logData = { a: [], b: [] };
  }
  renderHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

document.getElementById('tab-guide').addEventListener('click', () => {
  document.getElementById('tab-guide').classList.add('active');
  document.getElementById('tab-tracker').classList.remove('active');
  document.getElementById('view-guide').style.display = '';
  document.getElementById('view-tracker').style.display = 'none';
});
document.getElementById('tab-tracker').addEventListener('click', () => {
  document.getElementById('tab-tracker').classList.add('active');
  document.getElementById('tab-guide').classList.remove('active');
  document.getElementById('view-tracker').style.display = '';
  document.getElementById('view-guide').style.display = 'none';
});
document.getElementById('guide-a').addEventListener('click', () => {
  guideDay = 'a';
  document.getElementById('guide-a').classList.add('active');
  document.getElementById('guide-b').classList.remove('active');
  renderGuide();
});
document.getElementById('guide-b').addEventListener('click', () => {
  guideDay = 'b';
  document.getElementById('guide-b').classList.add('active');
  document.getElementById('guide-a').classList.remove('active');
  renderGuide();
});
document.getElementById('track-a').addEventListener('click', () => {
  trackDay = 'a';
  document.getElementById('track-a').classList.add('active');
  document.getElementById('track-b').classList.remove('active');
  renderLogFields();
  renderHistory();
});
document.getElementById('track-b').addEventListener('click', () => {
  trackDay = 'b';
  document.getElementById('track-b').classList.add('active');
  document.getElementById('track-a').classList.remove('active');
  renderLogFields();
  renderHistory();
});

document.getElementById('save-log').addEventListener('click', () => {
  const date = document.getElementById('log-date').value;
  if (!date) { showToast('Pick a date first'); return; }
  const weights = {};
  exercises[trackDay].forEach(ex => { weights[ex.id] = { weight: '', sets: '' }; });
  document.querySelectorAll('.weight-input').forEach(inp => {
    weights[inp.getAttribute('data-ex')].weight = inp.value;
  });
  document.querySelectorAll('.sets-input').forEach(inp => {
    weights[inp.getAttribute('data-ex')].sets = inp.value;
  });
  const entry = { id: Date.now().toString(), date: date, weights: weights };
  logData[trackDay].push(entry);
  persist();
  renderHistory();
  showToast('Session saved');
});

function showApp(){
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = '';
}
function showAuth(){
  document.getElementById('authScreen').style.display = '';
  document.getElementById('appScreen').style.display = 'none';
}

function initApp(){
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('log-date').value = today;
  renderGuide();
  renderLogFields();
  loadData();
}

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.color = 'var(--danger)';
  errEl.textContent = '';
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = error.message; return; }
  showApp();
  initApp();
};
document.getElementById('signupBtn').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.color = 'var(--danger)';
  errEl.textContent = '';
  const { error } = await supabaseClient.auth.signUp({ email, password });
  if(error){ errEl.textContent = error.message; return; }
  errEl.style.color = 'var(--accent)';
  errEl.textContent = 'Account created! Check your email to confirm, then log in.';
};
document.getElementById('logoutBtn').onclick = async () => {
  await supabaseClient.auth.signOut();
  showAuth();
};

(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if(data.session){
    showApp();
    initApp();
  } else {
    showAuth();
  }
})();
</script>
</body>
</html>
